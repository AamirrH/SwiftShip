server.port=${PORT:9020}
spring.application.name=${SPRING_APPLICATION_NAME:Order-Service}

spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}
## Add Client Part
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:9080}
spring.cloud.config.enabled=${SPRING_CLOUD_CONFIG_ENABLED:false}
spring.cloud.config.import-check.enabled=false

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.defer-datasource-initialization=${SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION:true}
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}}
eureka.client.register-with-eureka=${EUREKA_CLIENT_REGISTER_WITH_EUREKA:true}
eureka.client.fetch-registry=${EUREKA_CLIENT_FETCH_REGISTRY:true}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}
eureka.instance.non-secure-port-enabled=${EUREKA_INSTANCE_NON_SECURE_PORT_ENABLED:true}
eureka.instance.secure-port-enabled=${EUREKA_INSTANCE_SECURE_PORT_ENABLED:false}
eureka.instance.non-secure-port=${EUREKA_INSTANCE_NON_SECURE_PORT:${server.port}}
eureka.instance.secure-port=${EUREKA_INSTANCE_SECURE_PORT:443}

aamir.variable.hussain=${AAMIR_VARIABLE_HUSSAIN:render}

geoapify.api-key=${GEOAPIFY_API_KEY:b7eafc8c163e42c1a69be0f3a522452b}
geoapify.geocoding-url=${GEOAPIFY_GEOCODING_URL:https://api.geoapify.com/v1/geocode/search}

## Kafka Config
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=order-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.code.prodapp.orderservice.events.OrderConfirmedEvent
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.listener.missing-topics-fatal=false
