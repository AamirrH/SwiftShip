spring.application.name=Warehouse-Service
spring.config.import=configserver:http://localhost:9080
## Server Config
server.port=9060

## Inventory DB Properties
spring.datasource.url=jdbc:postgresql://localhost:5433/warehouseDB
spring.datasource.username=postgres
spring.datasource.password=AamirH23@1704
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true

## Eureka Server
## All services will go here to register themselves
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.kafka.consumer.group-id=warehouse-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.code.prodapp.warehouseservice.events.OrderConfirmedEvent

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

