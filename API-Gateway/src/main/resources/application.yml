spring:
  application:
    name: API-Gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: Order-Service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/orders/**,/customers/**
                - Method=GET,POST,PUT,PATCH,DELETE,OPTIONS
              filters:
                - name: AuthenticationFilter
                  args:
                    role: CUSTOMER
            - id: Inventory-Service
              uri: lb://INVENTORY-SERVICE
              predicates:
                - Path=/products/**
                - Method=GET,POST,PUT,PATCH,DELETE,OPTIONS
              filters:
                - name: AuthenticationFilter
                  args:
                    role: CUSTOMER
            - id: Auth-Service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**,/oauth2/**,/login/oauth2/**
                - Method=GET,POST,PUT,PATCH,DELETE,OPTIONS
            - id: Warehouse-Service
              uri: lb://WAREHOUSE-SERVICE
              predicates:
                - Path=/admin/warehouses/**
                - Method=GET,POST,PUT,PATCH,DELETE,OPTIONS
              filters:
                - name: AuthenticationFilter
                  args:
                    role: ADMIN
            - id: Routing-Service
              uri: lb://ROUTING-SERVICE
              predicates:
                - Path=/routes/**
                - Method=GET,POST,PUT,PATCH,DELETE,OPTIONS
              filters:
                - name: AuthenticationFilter
                  args:
                    role: ADMIN
            - id: Tracking-Service
              uri: lb://TRACKING-SERVICE
              predicates:
                - Path=/tracking/**,/drivers/**
                - Method=GET,POST,PUT,PATCH,DELETE,OPTIONS
              filters:
                - name: AuthenticationFilter
                  args:
                    role: CUSTOMER
            - id: Notification-Service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/notifications/**,/emails/**
                - Method=GET,POST,PUT,PATCH,DELETE,OPTIONS
              filters:
                - name: AuthenticationFilter
                  args:
                    role: CUSTOMER



server:
  port: ${PORT:9090}



## Eureka Server Config
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}
    non-secure-port-enabled: ${EUREKA_INSTANCE_NON_SECURE_PORT_ENABLED:true}
    secure-port-enabled: ${EUREKA_INSTANCE_SECURE_PORT_ENABLED:false}
    non-secure-port: ${EUREKA_INSTANCE_NON_SECURE_PORT:${server.port}}
    secure-port: ${EUREKA_INSTANCE_SECURE_PORT:443}


## API Gateway Config

jwt:
  SecretKey: ${JWT_SECRETKEY}

platform:
  health:
    timeout-millis: ${PLATFORM_HEALTH_TIMEOUT_MILLIS:5000}
    http-targets:
      - name: Discovery Service
        url: ${DISCOVERY_SERVICE_HEALTH_URL:https://swiftship-u7gw.onrender.com/}
      - name: API Gateway
        url: ${API_GATEWAY_HEALTH_URL:https://swiftship-api-gateway.onrender.com/keepalive.html}
      - name: Auth Service
        url: ${AUTH_SERVICE_HEALTH_URL:https://swiftship-authentication-service.onrender.com/keepalive.html}
      - name: Inventory Service
        url: ${INVENTORY_SERVICE_HEALTH_URL:https://swiftship-inventory-service.onrender.com/keepalive.html}
      - name: Order Service
        url: ${ORDER_SERVICE_HEALTH_URL:https://swiftship-order-service.onrender.com/keepalive.html}
      - name: Notification Service
        url: ${NOTIFICATION_SERVICE_HEALTH_URL:https://swiftship-notification-service.onrender.com/keepalive.html}
      - name: Warehouse Service
        url: ${WAREHOUSE_SERVICE_HEALTH_URL:https://swiftship-warehouse-service.onrender.com/keepalive.html}
      - name: Routing Service
        url: ${ROUTING_SERVICE_HEALTH_URL:https://swiftship-routing-service.onrender.com/keepalive.html}
      - name: Tracking Service
        url: ${TRACKING_SERVICE_HEALTH_URL:https://swiftship-tracking-service.onrender.com/keepalive.html}
    tcp-targets:
      - name: Aiven Kafka
        host: ${PLATFORM_HEALTH_KAFKA_HOST:managed-kafka-swiftship-managed-kafka-swiftship.l.aivencloud.com}
        port: ${PLATFORM_HEALTH_KAFKA_PORT:28471}
      - name: Redis
        host: ${PLATFORM_HEALTH_REDIS_HOST:enormous-enormous-fish-69531.db.redis.io}
        port: ${PLATFORM_HEALTH_REDIS_PORT:10407}
      - name: Neon PostgreSQL
        host: ${PLATFORM_HEALTH_POSTGRES_HOST:ep-proud-mountain-ao1bc8l5-pooler.c-2.ap-southeast-1.aws.neon.tech}
        port: ${PLATFORM_HEALTH_POSTGRES_PORT:5432}
