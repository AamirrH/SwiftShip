spring.application.name=Routing-Service
## Pull the configs from this port
spring.config.import=${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:9080}
spring.cloud.config.enabled=${SPRING_CLOUD_CONFIG_ENABLED:true}
spring.cloud.config.import-check.enabled=${SPRING_CLOUD_CONFIG_IMPORT_CHECK_ENABLED:true}

server.port=${PORT:${SERVER_PORT:9070}}

## Eureka Config
eureka.client.service-url.defaultZone=https://swiftship-u7gw.onrender.com/eureka/
eureka.client.register-with-eureka=${EUREKA_CLIENT_REGISTER_WITH_EUREKA:true}
eureka.client.fetch-registry=${EUREKA_CLIENT_FETCH_REGISTRY:true}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}
eureka.instance.secure-port-enabled=${EUREKA_INSTANCE_SECURE_PORT_ENABLED:false}
eureka.instance.non-secure-port-enabled=${EUREKA_INSTANCE_NON_SECURE_PORT_ENABLED:true}
eureka.instance.secure-port=${EUREKA_INSTANCE_SECURE_PORT:443}

## Kafka Config
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=routing-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.code.prodapp.routingservice.events.WarehouseAssignedEvent
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.listener.missing-topics-fatal=false
